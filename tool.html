  <head>

  <body class="subpage">
    <div class="ambient-bg" aria-hidden="true"><span></span><span></span><span></span></div>

      <a class="brand" href="index.html#top"><span class="brand-mark">B</span><span><strong>Barone</strong><small>Investment Group</small></span></a>

        <a href="index.html#education">Education</a>

    <main class="detail-page" data-detail-type="tool">
      <section class="detail-hero">
        <p class="eyebrow">Interactive tool</p>
        <h1 id="detail-title">Tool</h1>
        <p id="detail-summary"></p>
      </section>
      <section class="tool-lab">
        <article class="detail-panel">
          <h2>Inputs</h2>
          <ul id="tool-inputs"></ul>
          <h2>Use cases</h2>
          <ul id="tool-use-cases"></ul>

          <h2>Active graph</h2>
          <div id="tool-page-controls"></div>
          <canvas id="tool-page-chart" width="760" height="360"></canvas>
          <div class="result-box"><span>Current result</span><strong id="tool-page-result">$0</strong><small id="tool-page-note">Adjust inputs to update the chart.</small></div>

      </section>
      <section class="related-section">
        <h2>Related tools</h2>
        <div class="related-grid" id="related-links"></div>
